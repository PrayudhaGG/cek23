<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    
    <!-- Meta Tags untuk WhatsApp & Media Sosial -->
    <meta property="og:title" content="𝐏𝐑𝐀🥀">
    <meta property="og:description" content="🥀🥀🥀"
    <meta property="og:image" content="https://gangalink.vercel.app/i/vko6i0tw.jpg">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="800">
    <meta property="og:image:height" content="800">
    <meta property="og:url" content="https://contohkeren.com">
    <meta property="og:type" content="website">
    
    <!-- Meta untuk Twitter Card (opsional) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Halo! Ini Pesan Keren dari Saya 👋">
    <meta name="twitter:description" content="Klik link ini untuk lihat sesuatu yang menarik!">
    <meta name="twitter:image" content="https://gangalink.vercel.app/i/vko6i0tw.jpg">
    
    <title>Pesan Spesial untuk Kamu</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.8s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .profile-icon {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        
        .profile-icon img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .fallback-icon {
            font-size: 60px;
            color: white;
        }
        
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 28px;
        }
        
        .greeting {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .message {
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
            font-size: 16px;
        }
        
        .button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.5);
        }
        
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
        }
        
        @media (max-width: 600px) {
            .card {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .profile-icon {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="profile-icon">
            <!-- Gambar icon/pp - menggunakan gambar dari internet -->
            <img src="https://gangalink.vercel.app/i/vko6i0tw.jpg" alt="Profile Icon" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'fallback-icon\'>🥀</div>'">
        </div>
        
        <h1>Halo! 👋</h1>
        <div class="greeting">Pra Noxar🥀</div>
        
        <div class="message">
            Aku tahu, hidupmu memang bukan tentang aku saja. Tapi mengertilah, aku cemburu jika kamu terlalu asik dengan yang lain dibanding aku
        </div>
        
        <a href="#" class="button" id="clickButton">Klik untuk kejutan 🎁</a>
        
        <div class="footer">
        
        </div>
    </div>
    
    <script>
        document.getElementById('clickButton').addEventListener('click', function(e) {
            e.preventDefault();
            alert('🎉 Hore! Kamu hebat! Terima kasih sudah mengklik! 🎉');
        });
    </script>
</body>
</html>
